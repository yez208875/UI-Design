  <body>
    <header class="site-header"><nav class="nav" aria-label="主导航"><a class="brand" href="../index.html">YZC's UI Design Project</a><div class="nav-links"><a class="active" href="index.html">项目内容</a><a href="../resume.html">个人简历</a></div></nav></header>
    <main class="page app-case-page app-case-frameit">
      <section class="section app-case-hero">
        <div class="app-case-copy reveal">
          <h1>Frameit</h1>
          <p class="app-case-subtitle">数字化装裱、美化与实景预览</p>
        </div>
        <div class="app-case-hero-media reveal"><img src="../assets/images/crops/app-frameit-hero.webp" alt="Frameit APP 主视觉" loading="eager"></div>
      </section>
      <section class="section app-case-section app-case-gradient">
        <h2 class="reveal">APP 迭代目标</h2>
        <p class="reveal">UI 迭代基于 Frameit 版本功能升级，对 APP 信息结构、功能入口、内容组织方式以及用户路径进行了优化。目标是在保留核心体验的基础上，提高功能曝光和付费转化效率。</p>
        <div class="app-case-target-grid">
          <figure class="app-case-target-item reveal">
            <img src="../assets/images/crops/app-frameit-target-home.webp" alt="Frameit 首页 banner、金刚区图标和 Tab 栏调整" loading="lazy">
            <figcaption>通过 banner 展示区域、金刚区 icon、Tab 栏切换等方式调整，进行功能曝光，提升付费率</figcaption>
          </figure>
          <figure class="app-case-target-item reveal is-offset">
            <img src="../assets/images/crops/app-frameit-target-pay.webp" alt="Frameit 付费页会员权益改版对比" loading="lazy">
            <figcaption>基于 APP 新增功能进行权益区分，用胶囊切换形式进行会员付费调整</figcaption>
          </figure>
          <figure class="app-case-target-item reveal">
            <img src="../assets/images/crops/app-frameit-target-theme.webp" alt="Frameit 新增权益和节日活动主题适配" loading="lazy">
            <figcaption>基于新增权益及节日活动进行主题适配</figcaption>
          </figure>
          <figure class="app-case-target-item reveal">
            <img src="../assets/images/crops/app-frameit-target-share.webp" alt="Frameit 多社交平台快捷发布界面" loading="lazy">
            <figcaption>基于 APP 生成图的社交属性，适配多个社交平台快捷发布指令</figcaption>
          </figure>
          <figure class="app-case-target-item reveal">
            <img src="../assets/images/crops/app-frameit-target-icons.webp" alt="Frameit AI 与播放功能图标适配" loading="lazy">
            <figcaption>基于 APP Logo 与整体元素风格进行 icon 适配</figcaption>
          </figure>
        </div>
      </section>
      <section class="section app-case-section">
        <h2 class="reveal">APP UI 概览</h2>
        <div class="app-case-overview reveal"><img src="../assets/images/crops/app-frameit-overview.webp" alt="Frameit APP UI 概览" loading="lazy"></div>
      </section>
